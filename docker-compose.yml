# Base configuration shared by development and production.
# Override with docker-compose.dev.yml or docker-compose.production.yml.
services:
  db:
    # Builds a custom image with schema.sql baked in (see Dockerfile.db).
    # The init script runs only on first start (when no database exists).
    build:
      context: .
      dockerfile: Dockerfile.db
    environment:
      POSTGRES_USER: flick
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: flick
    ports:
      - "5432:5432"

  server:
    build:
      context: ../flick-server
    environment:
      DATABASE_URL: postgres://flick:${DB_PASSWORD}@db:5432/flick
      JWT_SECRET: ${JWT_SECRET}
      JWT_LIFE: ${JWT_LIFE}
      TMDB_API_KEY: ${TMDB_API_KEY}
    # Mapped to 3001 on host to avoid conflicts with other services.
    ports:
      - "3001:3000"
    depends_on:
      - db

  client:
    depends_on:
      - server
