name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Deploy
        run: |
          eval $(ssh-agent -s)
          echo "${{ secrets.SSH_PRIVATE_KEY }}" | base64 -d | tr -d '\r' > ~/.ssh_key
          chmod 600 ~/.ssh_key
          ssh-add ~/.ssh_key
          rm ~/.ssh_key
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          ssh-keyscan -H ${{ vars.PRODUCTION_HOST }} >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts
          unset DOCKER_HOST
          docker context create production --docker "host=ssh://hasse@${{ vars.PRODUCTION_HOST }}"
          docker context use production
          echo "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" > .env
          docker network create flick-network || true
          docker compose -f docker-compose.production.yml up -d --build
          docker system prune -f