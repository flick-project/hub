# Development overrides. Run with:
# docker compose -f docker-compose.yml -f docker-compose.dev.yml up --build
services:
  db:
    # Use the standard image directly in dev since local volume mounts work.
    image: postgres:17-alpine
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ../server/sql/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    ports:
      - "5432:5432"

  server:
    # Mount source code and restart on changes.
    volumes:
      - ../server/src:/app/src
    command: node --watch src/server.js
    env_file: .env
    ports:
      - "3000:3000"

  client:
    # Run Vite dev server with HMR instead of building with Nginx.
    image: node:24-alpine
    working_dir: /app
    volumes:
      - ../client:/app
      - /app/node_modules # Separate volume to avoid platform mismatch.
    command: sh -c "npm ci && npm run dev -- --host --port 5173"
    ports:
      - "5173:5173"
    env_file: .env

volumes:
  pgdata:
