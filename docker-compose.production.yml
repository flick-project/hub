# Production overrides. Run with:
# DOCKER_HOST=ssh://user@<ip> docker compose -f docker-compose.yml -f docker-compose.production.yml up --build -d
services:
  db:
    volumes:
      - pgdata:/var/lib/postgresql/data

  server:
    # Use production Dockerfile (npm ci --omit=dev, no watch mode).
    build:
      context: ../flick-server
      dockerfile: Dockerfile.production
    environment:
      NODE_ENV: production
      CORS_ORIGIN: https://flick.lingon.cloud
    restart: always

  client:
    # Build static assets with Vite and serve via Nginx.
    build:
      context: ../flick-client
      args:
        - VITE_API_URL=https://flick-api.lingon.cloud/api/v1
    restart: always

volumes:
  pgdata:

networks:
  default:
    external: true
    name: proxy
